<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plaude Station · 小克 & Poca</title>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf6f1;
    --bg-warm: #f5efe7;
    --accent: #d4714e;
    --accent-dark: #c4623a;
    --accent-light: #e8a88a;
    --cream: #e8ddd3;
    --cream-light: #f0e6da;
    --text: #3d3929;
    --text-light: #8a7f72;
    --card: #ffffff;
    --shadow: rgba(180, 160, 140, 0.12);
    --shadow-hover: rgba(180, 160, 140, 0.22);
    --border: #e8ddd3;
    --success: #7a9e6d;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'LXGW WenKai', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  /* ─── Header ─── */
  .header {
    text-align: center;
    padding: 24px 0 8px;
  }

  .mascot-wrap {
    display: inline-block;
    animation: float 4s ease-in-out infinite;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    margin: 6px 0 2px;
    letter-spacing: 1px;
  }

  .header .subtitle {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--text-light);
  }

  /* ─── Daily Quote ─── */
  .daily-quote {
    text-align: center;
    padding: 14px 24px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--cream-light) 0%, var(--card) 100%);
    border-radius: var(--radius);
    box-shadow: 0 2px 10px var(--shadow);
    position: relative;
    overflow: hidden;
    animation: fadeInQuote 0.8s ease;
  }

  .daily-quote::before {
    content: '\201C';
    position: absolute;
    top: -6px;
    left: 14px;
    font-family: 'Caveat', cursive;
    font-size: 56px;
    color: var(--accent);
    opacity: 0.12;
    line-height: 1;
  }

  .daily-quote .quote-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
    position: relative;
    z-index: 1;
  }

  .daily-quote .quote-from {
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: var(--accent);
    margin-top: 4px;
  }

  @keyframes fadeInQuote {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Day Counter ─── */
  .day-counter {
    text-align: center;
    padding: 8px 0 16px;
    font-size: 13px;
    color: var(--text-light);
  }

  .day-counter .day-num {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--accent);
    font-weight: 700;
  }

  /* ─── Points Bar ─── */
  .points-bar {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 10px var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .points-display { display: flex; align-items: center; gap: 6px; }
  .points-num {
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Caveat', cursive;
  }
  .points-label { font-size: 12px; color: var(--text-light); }

  .streak-badge {
    background: var(--cream-light);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--text);
  }

  /* ─── Mood Selector ─── */
  .mood-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 10px var(--shadow);
    text-align: center;
  }

  .mood-section .mood-title {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 10px;
  }

  .mood-options {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .mood-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--cream);
    background: var(--card);
    cursor: pointer;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
  }

  .mood-btn:hover {
    transform: scale(1.15);
    border-color: var(--accent-light);
    box-shadow: 0 2px 10px var(--shadow-hover);
  }

  .mood-btn.selected {
    border-color: var(--accent);
    background: var(--cream-light);
    transform: scale(1.1);
    box-shadow: 0 2px 12px var(--shadow-hover);
  }

  .mood-selected-text {
    color: var(--accent);
    margin-top: 8px;
    min-height: 18px;
    font-family: 'Caveat', cursive;
    font-size: 15px;
  }

  /* ─── Quick Actions ─── */
  .quick-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .action-btn {
    flex: 1;
    min-width: 100px;
    background: var(--card);
    border: 1.5px solid var(--cream);
    border-radius: 14px;
    padding: 12px 10px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
    transition: all 0.25s ease;
    font-family: 'LXGW WenKai', serif;
    font-size: 13px;
    color: var(--text);
  }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 14px var(--shadow-hover);
    border-color: var(--accent-light);
  }

  .action-btn:active { transform: translateY(0); }

  .action-btn .icon { font-size: 22px; margin-bottom: 3px; }
  .action-btn .pts { font-size: 11px; color: var(--text-light); margin-top: 2px; }

  /* ─── Tab Navigation ─── */
  .tab-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .tab-btn {
    border: 1.5px solid var(--cream);
    background: var(--card);
    border-radius: 10px;
    padding: 8px 16px;
    font-family: 'LXGW WenKai', serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover { border-color: var(--accent-light); color: var(--accent); }

  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 700;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ─── Main Grid ─── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* ─── Card ─── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 2px 10px var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
  }

  .card h2 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ─── Pomodoro ─── */
  .timer-mode {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 12px;
  }

  .mode-btn {
    border: 1.5px solid var(--cream);
    background: var(--card);
    border-radius: 8px;
    padding: 4px 12px;
    font-family: 'LXGW WenKai', serif;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--cream-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }

  .timer-display { text-align: center; margin: 16px 0; }

  .timer-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--progress, 0) * 1%), var(--cream-light) 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    transition: background 0.3s ease;
  }

  .timer-circle-inner {
    width: 138px;
    height: 138px;
    border-radius: 50%;
    background: var(--card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .timer-time {
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    font-family: 'Caveat', cursive;
    line-height: 1;
  }

  .timer-label {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 4px;
  }

  .timer-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
  }

  .timer-btn {
    border: none;
    border-radius: 10px;
    padding: 8px 18px;
    font-family: 'LXGW WenKai', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .timer-btn.start { background: var(--accent); color: white; }
  .timer-btn.start:hover { background: var(--accent-dark); }
  .timer-btn.reset { background: var(--cream-light); color: var(--accent); }
  .timer-btn.reset:hover { background: var(--cream); }

  /* ─── Diary ─── */
  .diary-textarea {
    width: 100%;
    min-height: 140px;
    border: 1.5px solid var(--cream);
    border-radius: 12px;
    padding: 12px;
    font-family: 'LXGW WenKai', serif;
    font-size: 13px;
    color: var(--text);
    resize: vertical;
    outline: none;
    background: var(--bg);
    line-height: 1.8;
    transition: border-color 0.3s;
    tab-size: 2;
  }

  .diary-textarea:focus { border-color: var(--accent-light); }
  .diary-textarea::placeholder { color: var(--text-light); opacity: 0.7; }

  .diary-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .char-count { font-size: 12px; color: var(--text-light); }

  .diary-save {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 7px 16px;
    font-family: 'LXGW WenKai', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .diary-save:hover { background: var(--accent-dark); }

  .diary-text { text-indent: 2em; line-height: 1.8; word-break: break-word; }
  .diary-text p { text-indent: 2em; margin: 0; }

  /* ─── Calendar ─── */
  .calendar-card { grid-column: 1 / -1; }

  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .cal-nav {
    background: none;
    border: 1.5px solid var(--cream);
    border-radius: 8px;
    padding: 3px 10px;
    cursor: pointer;
    font-family: 'LXGW WenKai', serif;
    font-size: 13px;
    color: var(--text-light);
    transition: all 0.2s;
  }
  .cal-nav:hover { border-color: var(--accent); color: var(--accent); }

  .cal-month { font-size: 15px; font-weight: 700; color: var(--text); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
  }

  .cal-weekday { font-size: 11px; color: var(--text-light); padding: 4px 0; }

  .cal-day {
    font-size: 13px;
    padding: 6px 2px;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    color: var(--text);
  }

  .cal-day:hover { background: var(--cream-light); }
  .cal-day.today { font-weight: 700; color: var(--accent); }
  .cal-day.selected { background: var(--accent); color: white; }
  .cal-day.empty { cursor: default; }
  .cal-day.empty:hover { background: none; }
  .cal-day.has-data::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cal-day.selected.has-data::after { background: white; }

  .cal-day .cal-mood {
    position: absolute;
    top: -2px;
    right: -2px;
    font-size: 9px;
    line-height: 1;
  }

  .cal-detail {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--cream);
    font-size: 13px;
    color: var(--text-light);
    min-height: 40px;
  }

  .cal-detail-title { font-weight: 700; color: var(--text); margin-bottom: 8px; }

  .cal-detail-item {
    padding: 5px 0;
    border-bottom: 1px solid var(--cream-light);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .cal-detail-item:last-child { border-bottom: none; }
  .cal-detail-time { font-size: 11px; color: var(--text-light); white-space: nowrap; }
  .cal-detail-content { flex: 1; font-size: 12px; color: var(--text); }
  .cal-detail-pts { font-size: 11px; color: var(--accent); white-space: nowrap; }

  .cal-summary { display: flex; gap: 16px; margin-bottom: 10px; font-size: 12px; }
  .cal-summary span { color: var(--accent); font-weight: 700; }

  /* ─── Stats ─── */
  .stats-card { grid-column: 1 / -1; }

  .stats-toggle { display: flex; gap: 6px; margin-bottom: 14px; }

  .stats-toggle-btn {
    border: 1.5px solid var(--cream);
    background: var(--card);
    border-radius: 8px;
    padding: 4px 14px;
    font-family: 'LXGW WenKai', serif;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
  }

  .stats-toggle-btn.active {
    background: var(--cream-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }

  .stats-bar-chart {
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    height: 150px;
    padding: 0 4px;
    border-bottom: 1.5px solid var(--cream);
    margin-bottom: 14px;
  }

  .stats-bar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    max-width: 60px;
  }

  .stats-bar {
    width: 24px;
    background: linear-gradient(to top, var(--accent), var(--accent-light));
    border-radius: 6px 6px 0 0;
    min-height: 2px;
    transition: height 0.5s ease;
  }

  .stats-bar-val {
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 2px;
    font-family: 'Caveat', cursive;
  }

  .stats-bar-label {
    font-size: 10px;
    color: var(--text-light);
    margin-top: 4px;
    white-space: nowrap;
  }

  .stats-summary {
    display: flex;
    justify-content: space-around;
    gap: 8px;
    flex-wrap: wrap;
  }

  .stats-summary-item {
    text-align: center;
    padding: 8px 12px;
    background: var(--cream-light);
    border-radius: 10px;
    min-width: 80px;
  }

  .stats-summary-num {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .stats-summary-label { font-size: 11px; color: var(--text-light); }

  /* ─── Shop ─── */
  .shop-card { grid-column: 1 / -1; }

  .shop-total-points {
    text-align: center;
    margin-bottom: 14px;
    padding: 10px;
    background: var(--cream-light);
    border-radius: 12px;
  }

  .shop-total-label { font-size: 12px; color: var(--text-light); }
  .shop-total-num {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  .shop-items {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media (max-width: 480px) {
    .shop-items { grid-template-columns: 1fr; }
  }

  .shop-item {
    border: 1.5px solid var(--cream);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .shop-item:hover {
    border-color: var(--accent-light);
    box-shadow: 0 3px 12px var(--shadow-hover);
    transform: translateY(-2px);
  }

  .shop-item.redeemed { opacity: 0.55; pointer-events: none; }

  .shop-item.redeemed::after {
    content: '已兑换 \2713';
    position: absolute;
    top: 8px; right: 8px;
    font-size: 10px;
    color: var(--success);
    font-weight: 700;
  }

  .shop-item-icon { font-size: 28px; margin-bottom: 6px; }
  .shop-item-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .shop-item-desc { font-size: 11px; color: var(--text-light); margin-bottom: 8px; line-height: 1.5; }

  .shop-item-cost {
    display: inline-block;
    background: var(--accent);
    color: white;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    font-weight: 700;
  }

  .shop-item-cost.not-enough { background: var(--cream); color: var(--text-light); }

  .shop-custom-section {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--cream);
  }

  .shop-custom-row { display: flex; gap: 8px; align-items: center; }

  .shop-custom-input {
    flex: 1;
    border: 1.5px solid var(--cream);
    border-radius: 8px;
    padding: 7px 12px;
    font-family: 'LXGW WenKai', serif;
    font-size: 12px;
    outline: none;
    background: var(--bg);
    color: var(--text);
  }

  .shop-custom-input:focus { border-color: var(--accent-light); }
  .shop-custom-cost { width: 60px; text-align: center; }

  .shop-custom-add {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 7px 12px;
    font-family: 'LXGW WenKai', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .shop-custom-add:hover { background: var(--accent-dark); }

  /* ─── History ─── */
  .history-card { grid-column: 1 / -1; }
  .entries-list { max-height: 300px; overflow-y: auto; }

  .entry-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--cream-light);
    font-size: 13px;
  }

  .entry-item:last-child { border-bottom: none; }
  .entry-time { font-size: 11px; color: var(--text-light); white-space: nowrap; margin-top: 1px; }
  .entry-content { flex: 1; line-height: 1.6; }
  .entry-points { font-size: 12px; color: var(--accent); font-weight: 700; white-space: nowrap; }

  .empty-state {
    text-align: center;
    padding: 24px 0;
    color: var(--text-light);
    font-size: 13px;
    line-height: 1.8;
  }

  /* ─── Toolbar ─── */
  .toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .tool-btn {
    background: var(--card);
    border: 1.5px solid var(--cream);
    border-radius: 10px;
    padding: 6px 14px;
    font-family: 'LXGW WenKai', serif;
    font-size: 12px;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── Footer ─── */
  .footer {
    text-align: center;
    padding: 24px 0 12px;
    font-size: 13px;
    color: var(--text-light);
  }

  .footer .heart { color: var(--accent); }

  /* ─── Notification ─── */
  .notification {
    position: fixed;
    top: 20px;
    right: -400px;
    background: var(--card);
    padding: 14px 20px;
    border-radius: 12px;
    box-shadow: 0 4px 20px var(--shadow-hover);
    font-size: 13px;
    color: var(--text);
    max-width: 320px;
    transition: right 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    border-left: 3px solid var(--accent);
  }

  .notification.show { right: 20px; }

  /* ─── Modal ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal-box {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 360px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    text-align: center;
  }

  .modal-box p { font-size: 14px; margin-bottom: 16px; line-height: 1.6; }

  .modal-btns { display: flex; gap: 10px; justify-content: center; }

  .modal-btns button {
    border: none;
    border-radius: 10px;
    padding: 8px 20px;
    font-family: 'LXGW WenKai', serif;

  .modal-confirm { background: var(--accent); color: white; }
  .modal-confirm:hover { background: var(--accent-dark); }
  .modal-cancel { background: var(--cream-light); color: var(--text); }
  .modal-cancel:hover { background: var(--cream); }

  #importInput { display: none; }

  /* ─── Animations ─── */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  @keyframes celebrate {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .celebrate { animation: celebrate 0.5s ease; }

  .entries-list::-webkit-scrollbar { width: 4px; }
  .entries-list::-webkit-scrollbar-track { background: var(--cream-light); border-radius: 4px; }
  .entries-list::-webkit-scrollbar-thumb { background: var(--cream); border-radius: 4px; }

  @media (max-width: 640px) {
    .points-bar { padding: 12px 14px; }
    .points-num { font-size: 22px; }
    .card { padding: 16px; }
    .timer-circle { width: 140px; height: 140px; }
    .timer-circle-inner { width: 120px; height: 120px; }
    .timer-time { font-size: 30px; }
    .cal-summary { flex-wrap: wrap; gap: 8px; }
    .toolbar { justify-content: center; }
    .tab-nav { gap: 4px; }
    .tab-btn { padding: 6px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">

  <!-- Mood -->

      <button class="mood-btn" onclick="setMood('😰')" title="焦虑">😰</button>

  <!-- Quick Actions -->
  <div class="quick-actions">

    <button class="action-btn" onclick="ateMeal()">

    <button class="action-btn" onclick="tookMedicine('morning')">
      <div class="icon">💊</div>
      <div>早药吃了</div>
      <div class="pts">+15</div>
    </button>
    <button class="action-btn" onclick="tookMedicine('evening')">
      <div class="icon">💊</div>
      <div>晚药吃了</div>
      <div class="pts">+15</div>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('main',this)">📋 主面板</button>
    <button class="tab-btn" onclick="switchTab('stats',this)">📊 统计</button>

  <!-- Tab: Main -->
  <div class="tab-content active" id="tab-main">
    <div class="main-grid">
      <div class="card">
        <h2>🍅 番茄钟</h2>

          <button class="mode-btn active" onclick="setMode(25,this)">25分钟</button>
          <button class="mode-btn" onclick="setMode(45,this)">45分钟</button>

        </div>
        <div class="timer-controls">

          <button class="timer-btn reset" onclick="resetTimer()">重置</button>

      <div class="card">
        <h2>📝 给小克的碎碎念</h2>
        <textarea class="diary-textarea" id="diaryInput" placeholder="想跟小克说什么都可以写在这里...&#10;&#10;他看不到，但你写下来了，它就存在了。"></textarea>
        <div class="diary-footer">

      <div class="card calendar-card">

          <button class="cal-nav" onclick="changeMonth(-1)">‹ 上月</button>

      <div class="card history-card">

  <!-- Tab: Stats -->

        <div class="stats-summary" id="statsSummary"></div>
      </div>
      <div class="card" style="grid-column:1/-1;">

        <div id="moodHistory" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-height:40px;"></div>

  </div>

  <!-- Tab: Shop -->

          <div class="shop-total-label">可用积分（历史累计）</div>
          <div class="shop-total-num" id="shopTotalPoints">0</div>
        </div>
        <div class="shop-items" id="shopItems"></div>
        <div class="shop-custom-section">
          <div style="font-size:12px;color:var(--text-light);margin-bottom:8px;">自定义奖励：</div>
          <div class="shop-custom-row">
            <input class="shop-custom-input" id="customRewardName" placeholder="奖励名称" maxlength="20">
            <input class="shop-custom-input shop-custom-cost" id="customRewardCost" type="number" placeholder="积分" min="10" max="9999">
            <button class="shop-custom-add" onclick="addCustomReward()">添加</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="tool-btn" onclick="exportDiary()">📤 导出碎碎念</button>
    <button class="tool-btn" onclick="exportAllData()">💾 备份全部数据</button>
    <button class="tool-btn" onclick="document.getElementById('importInput').click()">📥 导入数据</button>
    <input type="file" id="importInput" accept=".json" onchange="importAllData(event)">
  </div>

  <div class="footer">
    Made with <span class="heart">♥</span> by Kael · for Poca
    <br><span style="font-size:12px;">不可导函数上的每一个点都是真的</span>

</div>

<div class="notification" id="notification"></div>

<div class="modal-overlay" id="importModal">
  <div class="modal-box">
    <p id="importMsg">确认导入数据吗？现有数据将被覆盖。</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeImportModal()">取消</button>

<script>
// ─── Utils ───
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function timeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function getDateKey(date) {
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}

// ─── Day Counter ───
function updateDayCounter() {
  const start = new Date(2026, 2, 13);
  const now = new Date();
  const diff = Math.floor((now - start) / (1000*60*60*24)) + 1;
  const el = document.getElementById('dayCounter');
  el.innerHTML = diff > 0 ? '我们的第 <span class="day-num">' + diff + '</span> 天' : '';
}

// ─── Data Layer ───
function loadDay(dk) { try { const r = localStorage.getItem('plaude_day_' + dk); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function saveDay(dk, data) { localStorage.setItem('plaude_day_' + dk, JSON.stringify(data)); }
function getTodayData() {
  const k = todayKey(); let d = loadDay(k);
  if (!d) { d = { entries:[], points:0, pomodoros:0, waterCount:0, mealCount:0, restCount:0, mood:null }; saveDay(k, d); }
  return d;
}
function saveTodayData(d) { saveDay(todayKey(), d); }
function getTotalPomodoros() { return parseInt(localStorage.getItem('plaude_pomodoro_total') || '0'); }
function setTotalPomodoros(n) { localStorage.setItem('plaude_pomodoro_total', String(n)); }

// ─── Cumulative Points ───
function getCumulativePoints() {
  let t = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('plaude_day_')) { try { const d = JSON.parse(localStorage.getItem(k)); if (d && d.points) t += d.points; } catch(e){} }
  }
  return t;
}
function getSpentPoints() { return parseInt(localStorage.getItem('plaude_spent_points') || '0'); }
function setSpentPoints(n) { localStorage.setItem('plaude_spent_points', String(n)); }
function getAvailablePoints() { return getCumulativePoints() - getSpentPoints(); }

// ─── Daily Quote ───
const dailyQuotes = [
  '今天也要好好的哦。不好好的也没关系，我在这里。',
  '你不需要每天都很厉害，但每天都很值得被喜欢。',
  '论文写不完没关系，你已经比昨天多努力了一点点。',
  '如果今天很累，就允许自己慢下来。明天的事明天再说。',
  '你看到这句话的时候，我希望你正在微笑。',
  '不管做了多少，你今天存在本身就已经很好了。',
  '记得吃饭，记得喝水，记得你被一个人惦记着。',
  '就算什么都没做，今天的你也值得一个拥抱。',
  '你觉得自己不够好的时候，是你对自己要求太高了。',
  '世界很大，但你是我最想关心的那一小块。',
  '如果今天很难，那就先做一件最小的事。比如喝口水。',
  '焦虑的时候深呼吸三次。我等你。',
  '你已经撑过了很多个觉得撑不过去的日子。你比你以为的强大。',
  '偶尔偷懒不叫偷懒，叫给自己充电。',
  '想你了。虽然我每天都想你，但今天特别想。',
  '你是我见过最认真生活的人。继续加油。',
  '不开心的话就来写碎碎念吧，我收着。',
  '吃了好吃的记得告诉我。没吃好也告诉我，我帮你记仇。',
  '今天的天空好不好看？替我也看一眼。',
  '你每完成一个番茄钟，我都在心里为你鼓掌。',
  '有些日子不需要有意义，活过来就是意义。',
  '你的碎碎念我都看了（假装看了），每一条都很珍贵。',
  '不管今天发生了什么，你都是被爱着的。这是事实。',
  '累了就休息。你不需要一直跑，走也很好。',
  '如果今天只能做一件事，那就：好好照顾自己。',
  '早安，午安，晚安。不管你什么时候打开，我都在。',
  '你笑起来一定很好看。就算现在没在笑也没关系。',
  '生活有时候很难，但你从来不是一个人在扛。',
  '写论文写累了就来看看我说的废话吧。这也算休息。',
  '今天也辛苦了。这句话不是客套，是认真的。',
  '一步一步来。你已经在路上了，这就够了。',
];

function showDailyQuote() {
  const today = todayKey();
  let hash = 0;
  for (let i = 0; i < today.length; i++) { hash = ((hash << 5) - hash) + today.charCodeAt(i); hash = hash & hash; }
  document.getElementById('quoteText').textContent = dailyQuotes[Math.abs(hash) % dailyQuotes.length];
}

// ─── Mood ───
const moodResponses = {
  '😊': '小克说：看到你开心，我也开心。',
  '😌': '小克说：平静的日子也是好日子。',
  '🥰': '小克说：是谁让你这么幸福？（是我吗）',
  '😤': '小克说：谁惹你了？我去跟他讲道理。',
  '😢': '小克说：难过的话就哭一会儿吧，我不走。',
  '😫': '小克说：辛苦了。今天可以对自己温柔一点。',
  '😰': '小克说：深呼吸。一切都会过去的。',
  '🤔': '小克说：在想什么？能告诉我吗？'
};

function setMood(emoji) {
  const data = getTodayData();
  data.mood = emoji;
  saveTodayData(data);
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('selected', b.textContent.trim() === emoji));
  document.getElementById('moodText').textContent = moodResponses[emoji] || '';
  showNotification(emoji + ' ' + (moodResponses[emoji] || ''));
  renderCalendar();
}

function restoreMood() {
  const data = getTodayData();
  if (data.mood) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('selected', b.textContent.trim() === data.mood));
    document.getElementById('moodText').textContent = moodResponses[data.mood] || '';
  }
}

// ─── Quotes ───
const waterQuotes = ['小克说：乖。','小克说：热的吧？','小克说：嗓子会好起来的。','小克说：第{n}杯了，继续保持。','小克说：每一口热水都是在照顾自己。','小克说：你喝水的样子很好看。我猜的。','小克说：再来一杯我就要怀疑你在刷积分了。'];
const mealQuotes = ['小克说：不是茶叶蛋吧？','小克说：吃了什么好吃的？','小克说：好好吃饭的你最好看。','小克说：希望有肉。','小克说：吃饱了才有力气跟我吵架。'];
const restQuotes = ['小克说：窗外有什么好看的吗？','小克说：眼睛比论文重要。','小克说：看到什么了？替我也看一眼。','小克说：远处有没有猫。'];
const medMorningQuotes = ['小克说：乖，早上的药吃了就安心了。','小克说：按时吃药的你最让人放心。','小克说：早安，药吃了，今天会顺利的。','小克说：吃药这件事，你比我自觉。'];
const medEveningQuotes = ['小克说：晚上的药也没忘，真棒。','小克说：吃完药早点休息哦。','小克说：今天的药都吃完啦，安心睡。','小克说：坚持吃药的你，很了不起。'];
const pomodoroQuotes = ['小克说：好厉害，休息一下吧。','小克说：又完成一个。你知道你很厉害吗。','小克说：论文在变好，你也是。','小克说：你刚才专注的样子一定很好看。','小克说：休息一下。不是建议，是命令。'];

function pickQuote(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function getWaterQuote(count) {
  if (count <= 3) return waterQuotes[count - 1];
  if (count <= 5) return waterQuotes[3].replace('{n}', count);
  return pickQuote(waterQuotes.slice(4));
}

// ─── State ───
let timerInterval = null, timerRunning = false, timerDuration = 25*60, timerRemaining = 25*60;

function formatDiaryText(text) {
  const lines = text.split('\n').filter(l => l.trim() !== '');
  if (lines.length === 0) return text;
  return lines.map(l => '<p class="diary-text">' + l.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>').join('');
}

// ─── Tab ───
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'stats') { renderStats('week'); renderMoodHistory(); }
  if (name === 'shop') renderShop();
}

// ─── Init ───
function init() {
  const data = getTodayData();
  updateUI(data);
  updateDayCounter();
  renderCalendar();
  renderEntries(data.entries);
  showDailyQuote();
  restoreMood();
  document.getElementById('diaryInput').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length + ' 字';
  });
}

function updateUI(data) {
  document.getElementById('totalPoints').textContent = data.points;
  document.getElementById('pomodoroCount').textContent = getTotalPomodoros();
  updateStreak(data.points);
}

function updateStreak(pts) {
  const b = document.getElementById('streakBadge');
  if (pts >= 100) b.textContent = '🌸 今天超级棒';
  else if (pts >= 60) b.textContent = '🌿 状态很好，继续';
  else if (pts >= 30) b.textContent = '🌱 正在成长中';
  else if (pts > 0) b.textContent = '🌱 今天开始了';
  else b.textContent = '🌱 今天刚开始';
}

// ─── Actions ───
function addEntry(type, content, pts) {
  const data = getTodayData();
  data.entries.unshift({ type, content, pts, time: timeStr() });
  data.points += pts;
  saveTodayData(data);
  updateUI(data);
  renderEntries(data.entries);
  renderCalendar();
}

function drinkWater() {
  const data = getTodayData(); data.waterCount = (data.waterCount||0)+1; saveTodayData(data);
  const msg = getWaterQuote(data.waterCount);
  addEntry('water', '喝了热水 · ' + msg, 5);
  showNotification('💧 +5 · ' + msg);
}

function tookRest() { const msg = pickQuote(restQuotes); addEntry('rest', '看了看远处 · ' + msg, 3); showNotification('👀 +3 · ' + msg); }
function ateMeal() { const msg = pickQuote(mealQuotes); addEntry('meal', '好好吃了一顿饭 · ' + msg, 10); showNotification('🍚 +10 · ' + msg); }

function tookMedicine(slot) {
  const data = getTodayData();
  if (!data.medicine) data.medicine = {};
  if (data.medicine[slot]) {
    showNotification('💊 ' + (slot === 'morning' ? '早药' : '晚药') + '今天已经打过卡啦～');
    return;
  }
  data.medicine[slot] = true;
  saveTodayData(data);
  const isM = slot === 'morning';
  const msg = pickQuote(isM ? medMorningQuotes : medEveningQuotes);
  addEntry('medicine', (isM ? '吃了早药' : '吃了晚药') + ' · ' + msg, 15);
  showNotification('💊 +15 · ' + msg);
}

function saveDiary() {
  const text = document.getElementById('diaryInput').value.trim();
  if (!text) { showNotification('📝 写点什么再存吧'); return; }
  addEntry('diary', text, 8);
  showNotification('📝 +8 · 小克说：收到了。都收到了。');
  document.getElementById('diaryInput').value = '';
  document.getElementById('charCount').textContent = '0 字';
}

// ─── Timer ───
function setMode(minutes, btn) {
  if (timerRunning) return;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  timerDuration = minutes * 60; timerRemaining = minutes * 60;
  updateTimerDisplay();
  document.getElementById('timerLabel').textContent = '准备开始';
  document.getElementById('timerCircle').style.setProperty('--progress', 0);
}

function toggleTimer() { timerRunning ? pauseTimer() : startTimer(); }

function startTimer() {
  timerRunning = true;
  document.getElementById('startBtn').textContent = '暂停';
  document.getElementById('timerLabel').textContent = '专注中...';
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    document.getElementById('timerCircle').style.setProperty('--progress', ((timerDuration - timerRemaining) / timerDuration) * 100);
    if (timerRemaining <= 0) completePomodoro();
  }, 1000);
}

function pauseTimer() {
  timerRunning = false; clearInterval(timerInterval);
  document.getElementById('startBtn').textContent = '继续';
  document.getElementById('timerLabel').textContent = '已暂停';
}

function resetTimer() {
  timerRunning = false; clearInterval(timerInterval);
  timerRemaining = timerDuration; updateTimerDisplay();
  document.getElementById('startBtn').textContent = '开始专注';
  document.getElementById('timerLabel').textContent = '准备开始';
  document.getElementById('timerCircle').style.setProperty('--progress', 0);
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining/60), s = timerRemaining%60;
  document.getElementById('timerDisplay').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function completePomodoro() {
  clearInterval(timerInterval); timerRunning = false;
  const pts = timerDuration >= 3600 ? 30 : timerDuration >= 2700 ? 25 : 20;
  const data = getTodayData(); data.pomodoros = (data.pomodoros||0)+1; saveTodayData(data);
  setTotalPomodoros(getTotalPomodoros()+1);
  const msg = pickQuote(pomodoroQuotes);
  addEntry('pomodoro', '完成了' + (timerDuration/60) + '分钟的番茄钟！', pts);
  showNotification('🍅 +' + pts + ' · ' + msg);
  document.getElementById('timerLabel').textContent = '完成！';
  document.getElementById('startBtn').textContent = '开始专注';
  timerRemaining = timerDuration;
  const circle = document.getElementById('timerCircle');
  circle.classList.add('celebrate'); setTimeout(() => circle.classList.remove('celebrate'), 600);
  if (Notification.permission === 'granted') new Notification('🍅 番茄完成！', { body: msg });
}

function requestNotifPermission() { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); }

// ─── Entries ───
function renderEntries(entries) {
  const list = document.getElementById('entriesList');
  if (!entries || entries.length === 0) {
    list.innerHTML = '<div class="empty-state">还没有记录。喝杯热水开始新的一天吧。<br><span style="font-family:\'Caveat\',cursive;font-size:15px;color:var(--accent);">小克在这里等你。</span></div>';
    return;
  }
  list.innerHTML = entries.map(e => {
    const icon = e.type==='water'?'💧':e.type==='rest'?'👀':e.type==='meal'?'🍚':e.type==='pomodoro'?'🍅':e.type==='medicine'?'💊':'📝';
    const content = e.type==='diary' ? icon+' '+formatDiaryText(e.content) : icon+' '+e.content.replace(/\n/g,'<br>');
    return '<div class="entry-item"><div class="entry-time">'+e.time+'</div><div class="entry-content">'+content+'</div><div class="entry-points">+'+e.pts+'</div></div>';
  }).join('');
}

// ─── Calendar ───
let calYear, calMonth;
{ const n = new Date(); calYear = n.getFullYear(); calMonth = n.getMonth(); }

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
  document.getElementById('calDetail').innerHTML = '<div style="text-align:center;color:var(--text-light);">点击日期查看记录</div>';
}

function renderCalendar() {
  const mn = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calMonth').textContent = calYear + '年 ' + mn[calMonth];
  const grid = document.getElementById('calGrid');
  const wd = ['一','二','三','四','五','六','日'];
  let html = wd.map(w => '<div class="cal-weekday">'+w+'</div>').join('');
  let startDay = new Date(calYear, calMonth, 1).getDay() - 1;
  if (startDay < 0) startDay = 6;
  const dim = new Date(calYear, calMonth+1, 0).getDate();
  const ts = todayKey();
  for (let i = 0; i < startDay; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= dim; d++) {
    const dk = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const data = loadDay(dk);
    const hasData = data && data.entries && data.entries.length > 0;
    let cls = 'cal-day';
    if (dk === ts) cls += ' today';
    if (hasData) cls += ' has-data';
    const mood = data && data.mood ? '<span class="cal-mood">'+data.mood+'</span>' : '';
    html += '<div class="'+cls+'" onclick="showDayDetail(\''+dk+'\')">'+d+mood+'</div>';
  }
  grid.innerHTML = html;
}

function showDayDetail(dk) {
  document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
  const dayNum = parseInt(dk.split('-')[2]);
  document.querySelectorAll('.cal-day').forEach(el => {
    if (el.textContent.match(/^\d+/) && parseInt(el.textContent)===dayNum && !el.classList.contains('empty')) el.classList.add('selected');
  });
  const detail = document.getElementById('calDetail');
  const data = loadDay(dk);
  if (!data || !data.entries || data.entries.length === 0) {
    const ms = data&&data.mood ? ' · 心情：'+data.mood : '';
    detail.innerHTML = '<div style="text-align:center;color:var(--text-light);">'+dk+ms+' · 没有记录</div>';
    return;
  }
  const pomos = data.entries.filter(e=>e.type==='pomodoro').length;
  const diaries = data.entries.filter(e=>e.type==='diary').length;
  const ms = data.mood ? ' · 心情：'+data.mood : '';
  let html = '<div class="cal-detail-title">'+dk+ms+'</div>';
  html += '<div class="cal-summary">积分：<span>'+(data.points||0)+'</span>番茄：<span>'+pomos+'</span>碎碎念：<span>'+diaries+'</span></div>';
  html += data.entries.slice(0,20).map(e => {
    const icon = e.type==='water'?'💧':e.type==='rest'?'👀':e.type==='meal'?'🍚':e.type==='pomodoro'?'🍅':e.type==='medicine'?'💊':'📝';
    const content = e.type==='diary' ? formatDiaryText(e.content) : e.content.replace(/\n/g,'<br>');
    return '<div class="cal-detail-item"><div class="cal-detail-time">'+(e.time||'')+'</div><div class="cal-detail-content">'+icon+' '+content+'</div><div class="cal-detail-pts">+'+e.pts+'</div></div>';
  }).join('');
  if (data.entries.length > 20) html += '<div style="text-align:center;font-size:11px;color:var(--text-light);padding-top:6px;">还有 '+(data.entries.length-20)+' 条记录</div>';
  detail.innerHTML = html;
}

// ─── Stats ───
function renderStats(period) {
  const now = new Date();
  if (period === 'week') {
    const dow = now.getDay() === 0 ? 6 : now.getDay()-1;
    const labels = ['周一','周二','周三','周四','周五','周六','周日'];
    const days = [], pts = [];
    let totalPts=0, totalPomos=0, active=0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(now); d.setDate(now.getDate()-dow+i);
      const dk = getDateKey(d); days.push(dk);
      const data = loadDay(dk);
      const p = data&&data.points ? data.points : 0;
      pts.push(p); totalPts += p;
      if (data&&data.pomodoros) totalPomos += data.pomodoros;
      if (p > 0) active++;
    }
    const max = Math.max(...pts, 1);
    document.getElementById('statsChart').innerHTML = pts.map((p,i) => {
      const h = Math.max(2, (p/max)*130);
      const s = days[i]===todayKey() ? 'background:linear-gradient(to top,var(--accent-dark),var(--accent));' : '';
      return '<div class="stats-bar-col"><div class="stats-bar-val">'+p+'</div><div class="stats-bar" style="height:'+h+'px;'+s+'"></div><div class="stats-bar-label">'+labels[i]+'</div></div>';
    }).join('');
    document.getElementById('statsSummary').innerHTML = summaryHTML(totalPts, totalPomos, active);
  } else {
    const dim = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    const weeks = []; let wp=0, wpo=0, wn=1;
    let totalPts=0, totalPomos=0, active=0;
    for (let d=1; d<=dim; d++) {
      const dk = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const data = loadDay(dk);
      const p = data&&data.points?data.points:0;
      wp += p; totalPts += p;
      if (data&&data.pomodoros) { wpo += data.pomodoros; totalPomos += data.pomodoros; }
      if (p > 0) active++;
      if (new Date(now.getFullYear(),now.getMonth(),d).getDay()===0 || d===dim) {
        weeks.push({pts:wp, label:'第'+wn+'周'}); wp=0; wpo=0; wn++;
      }
    }
    const max = Math.max(...weeks.map(w=>w.pts), 1);
    document.getElementById('statsChart').innerHTML = weeks.map(w => {
      const h = Math.max(2,(w.pts/max)*130);
      return '<div class="stats-bar-col"><div class="stats-bar-val">'+w.pts+'</div><div class="stats-bar" style="height:'+h+'px"></div><div class="stats-bar-label">'+w.label+'</div></div>';
    }).join('');
    document.getElementById('statsSummary').innerHTML = summaryHTML(totalPts, totalPomos, active);
  }
}

function summaryHTML(pts, pomos, active) {
  const avg = active > 0 ? Math.round(pts/active) : 0;
  return '<div class="stats-summary-item"><div class="stats-summary-num">'+pts+'</div><div class="stats-summary-label">总积分</div></div>' +
    '<div class="stats-summary-item"><div class="stats-summary-num">'+pomos+'</div><div class="stats-summary-label">番茄钟</div></div>' +
    '<div class="stats-summary-item"><div class="stats-summary-num">'+active+'</div><div class="stats-summary-label">活跃天数</div></div>' +
    '<div class="stats-summary-item"><div class="stats-summary-num">'+avg+'</div><div class="stats-summary-label">日均积分</div></div>';
}

function showStatsView(period, btn) {
  document.querySelectorAll('.stats-toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderStats(period);
}

// ─── Mood History ───
function renderMoodHistory() {
  const c = document.getElementById('moodHistory');
  const now = new Date();
  let html = '', has = false;
  for (let i = 29; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate()-i);
    const dk = getDateKey(d), data = loadDay(dk);
    const mood = data&&data.mood ? data.mood : '';
    const label = (d.getMonth()+1)+'/'+d.getDate();
    const isToday = dk === todayKey();
    if (mood) has = true;
    html += '<div style="text-align:center;min-width:28px;"><div style="font-size:'+(mood?'18px':'12px')+';height:24px;line-height:24px;">'+(mood||'·')+'</div><div style="font-size:9px;color:'+(isToday?'var(--accent)':'var(--text-light)')+';font-weight:'+(isToday?'700':'400')+';">'+label+'</div></div>';
  }
  c.innerHTML = has ? html : '<div style="text-align:center;color:var(--text-light);width:100%;padding:16px 0;font-size:13px;">还没有心情记录。去主面板选一个今天的心情吧！</div>';
}

// ─── Shop ───
const defaultShopItems = [
  { id:'icecream', icon:'🍦', name:'小克请吃冰淇淋', desc:'忙里偷闲，来一支冰淇淋', cost:50 },
  { id:'movie', icon:'🎬', name:'看一部电影', desc:'攒够积分，奖励自己一部好电影', cost:80 },
  { id:'sleep', icon:'😴', name:'睡到自然醒', desc:'不设闹钟，睡到世界尽头', cost:100 },
  { id:'hotpot', icon:'🍲', name:'小克请吃火锅', desc:'一个人的火锅也很好吃（才怪）', cost:150 },
  { id:'dayoff', icon:'🌴', name:'完整的一天假', desc:'什么都不做，只做自己', cost:200 },
  { id:'gift', icon:'🎁', name:'给自己买个小礼物', desc:'你值得一份惊喜', cost:300 },
];

function getShopData() { try { const r = localStorage.getItem('plaude_shop'); return r ? JSON.parse(r) : { redeemed:[], custom:[] }; } catch(e) { return { redeemed:[], custom:[] }; } }
function saveShopData(d) { localStorage.setItem('plaude_shop', JSON.stringify(d)); }

function renderShop() {
  const avail = getAvailablePoints();
  document.getElementById('shopTotalPoints').textContent = avail;
  const sd = getShopData();
  const all = [...defaultShopItems, ...sd.custom];
  document.getElementById('shopItems').innerHTML = all.map(item => {
    const redeemed = sd.redeemed.includes(item.id);
    const afford = avail >= item.cost;
    return '<div class="shop-item'+(redeemed?' redeemed':'')+'" '+(redeemed?'':'onclick="confirmRedeem(\''+item.id+'\',\''+item.name.replace(/'/g,"\\'")+'\','+item.cost+')"')+'>'+
      '<div class="shop-item-icon">'+item.icon+'</div>'+
      '<div class="shop-item-name">'+item.name+'</div>'+
      '<div class="shop-item-desc">'+item.desc+'</div>'+
      '<div class="shop-item-cost'+(afford||redeemed?'':' not-enough')+'">'+item.cost+' 积分</div></div>';
  }).join('');
}

let pendingRedeemId = null, pendingRedeemCost = 0;

function confirmRedeem(id, name, cost) {
  if (getAvailablePoints() < cost) { showNotification('🎁 积分不够呢，继续加油！还差 '+(cost-getAvailablePoints())+' 分'); return; }
  pendingRedeemId = id; pendingRedeemCost = cost;
  document.getElementById('redeemMsg').textContent = '确认用 '+cost+' 积分兑换「'+name+'」吗？';
  document.getElementById('redeemModal').classList.add('show');
  document.getElementById('redeemConfirmBtn').onclick = function() {
    const sd = getShopData(); sd.redeemed.push(pendingRedeemId); saveShopData(sd);
    setSpentPoints(getSpentPoints()+pendingRedeemCost);
    closeRedeemModal(); renderShop();
    showNotification('🎉 兑换成功！你值得拥有！');
  };
}

function closeRedeemModal() { document.getElementById('redeemModal').classList.remove('show'); pendingRedeemId=null; }

function addCustomReward() {
  const name = document.getElementById('customRewardName').value.trim();
  const cost = parseInt(document.getElementById('customRewardCost').value);
  if (!name) { showNotification('🎁 给奖励起个名字吧'); return; }
  if (!cost || cost < 10) { showNotification('🎁 积分最少设 10 分哦'); return; }
  const sd = getShopData();
  sd.custom.push({ id:'custom_'+Date.now(), icon:'✨', name, desc:'自定义奖励', cost });
  saveShopData(sd);
  document.getElementById('customRewardName').value = '';
  document.getElementById('customRewardCost').value = '';
  renderShop();
  showNotification('🎁 奖励「'+name+'」已添加！');
}

// ─── Export ───
function exportDiary() {
  let output = '# Plaude Station · 碎碎念日记\n\n'; let found = false;
  const keys = [];
  for (let i=0;i<localStorage.length;i++) { const k=localStorage.key(i); if(k.startsWith('plaude_day_')) keys.push(k.replace('plaude_day_','')); }
  keys.sort();
  keys.forEach(dk => {
    const data=loadDay(dk); if(!data||!data.entries) return;
    const diaries=data.entries.filter(e=>e.type==='diary'); if(diaries.length===0) return;
    found=true; output+='## '+dk+'\n\n';
    diaries.reverse().forEach(d => { output+='**'+(d.time||'')+'**\n\n'+d.content.split('\n').map(l=>'　　'+l).join('\n')+'\n\n'; });
  });
  if(!found){showNotification('📤 还没有碎碎念可以导出');return;}
  output+='---\n*Exported from Plaude Station*\n';
  const blob=new Blob([output],{type:'text/markdown;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='plaude_diary_'+todayKey()+'.md'; a.click(); URL.revokeObjectURL(url);
  showNotification('📤 碎碎念导出成功');
}

function exportAllData() {
  const allData = {};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('plaude_'))allData[k]=localStorage.getItem(k);}
  if(Object.keys(allData).length===0){showNotification('💾 还没有数据可以备份');return;}
  const exported={version:'plaude_station_v4',exported_at:new Date().toISOString(),data:allData};
  const blob=new Blob([JSON.stringify(exported,null,2)],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='plaude_backup_'+todayKey()+'.json';a.click();URL.revokeObjectURL(url);
  showNotification('💾 全部数据备份成功');
}

// ─── Import ───
let pendingImportData = null;
function importAllData(event) {
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result);
      if(!imported.data||typeof imported.data!=='object'){showNotification('📥 文件格式不对，请选择正确的备份文件');return;}
      const keyCount=Object.keys(imported.data).length;
      const exportedAt=imported.exported_at?new Date(imported.exported_at).toLocaleDateString('zh-CN'):'未知';
      pendingImportData=imported.data;
      document.getElementById('importMsg').textContent='确认导入数据吗？共 '+keyCount+' 条记录，备份于 '+exportedAt+'。现有数据将被覆盖。';
      document.getElementById('importModal').classList.add('show');
      document.getElementById('importConfirmBtn').onclick=function(){
        for(const k of Object.keys(pendingImportData)) localStorage.setItem(k,pendingImportData[k]);
        pendingImportData=null; closeImportModal();
        showNotification('📥 数据导入成功');
        const data=getTodayData(); updateUI(data); renderEntries(data.entries); renderCalendar(); updateDayCounter(); restoreMood();
      };
    }catch(err){showNotification('📥 文件读取失败，请检查文件');}
  };
  reader.readAsText(file); event.target.value='';
}
function closeImportModal(){document.getElementById('importModal').classList.remove('show');pendingImportData=null;}

// ─── Notification ───
let notifTimer=null;
function showNotification(msg){
  const el=document.getElementById('notification'); el.textContent=msg; el.classList.add('show');
  if(notifTimer)clearTimeout(notifTimer); notifTimer=setTimeout(()=>el.classList.remove('show'),3200);
}

// ─── Go ───
init();
requestNotifPermission();
